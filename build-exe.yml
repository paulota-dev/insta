name: Build Instagram Downloader EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compilar executável com PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "InstagramDownloader" instagram_downloader.py

      - name: Enviar executável como artefato
        uses: actions/upload-artifact@v4
        with:
          name: InstagramDownloader-Windows
          path: dist/InstagramDownloader.exe
